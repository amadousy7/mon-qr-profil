<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Mon Profil</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <!-- Icons -->
    <script src="https://kit.fontawesome.com/4adadbbf6d.js" crossorigin="anonymous"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #141e30, #243b55);
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            width: 350px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            animation: fadeIn 1s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .profile-img {
            width: 120px;
            height: 120px;      
            border-radius: 50%;
            border: 4px solid white;
            object-fit: cover;
            margin-bottom: 20px;
        }

        h1 {
            color: white;
            font-size: 24px;
            margin-bottom: 10px;
        }

        p {
            color: #ccc;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin: 15px 0;
            padding: 12px;
            border-radius: 30px;
            text-decoration: none;
            color: white;
            font-weight: 500;
            transition: 0.3s;
        }

        .github {
            background: #333;
        }

        .github:hover {
            background: #000;
            transform: scale(1.05);
        }

        .linkedin {
            background: #0077b5;
        }

        .linkedin:hover {
            background: #005582;
            transform: scale(1.05);
        }

        footer {
            margin-top: 25px;
            font-size: 12px;
            color: #aaa;
        }
    </style>
</head>
<body>

    <div class="card">
        <img src="IMG_4914.jpg" class="profile-img">

        <h1>Amadou SY</h1>
        <p>Développeur | Passionné de Tech 🚀</p>

        <a href="https://github.com/amadousy7" target="_blank" class="btn github">
            <i class="fab fa-github"></i> GitHub
        </a>

        <a href="https://www.linkedin.com/in/amadou-sy-086aa2394/" target="_blank" class="btn linkedin">
            <i class="fab fa-linkedin"></i> LinkedIn
        </a>

        <footer>
            © 2026 - Tous droits réservés
        </footer>
    </div>

</body>
</html>
